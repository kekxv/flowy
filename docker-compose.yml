services:
  app:
    image: ghcr.io/kekxv/flowy:latest
    ports:
      - "${PORT:-80}:80"
    volumes:
      - flowy_data:/data
    environment:
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-secret}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    restart: unless-stopped

volumes:
  flowy_data:
